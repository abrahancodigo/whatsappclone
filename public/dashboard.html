<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - Mensajeria</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <span class="brand">Mensajeria</span>
    <div class="right">
      <span id="username-display"></span>
      <button id="logout-btn">Salir</button>
    </div>
  </header>

  <div class="container">
    <div class="panel">
      <h2>Crear chat</h2>
      <div class="row">
        <input type="text" id="create-name" class="inline" placeholder="Nombre del chat" maxlength="100">
        <button id="create-btn" class="btn-small">Crear</button>
      </div>
    </div>

    <div class="panel">
      <h2>Unirse a un chat</h2>
      <div class="row">
        <input type="text" id="join-code" class="inline" placeholder="Codigo del chat" maxlength="10">
        <button id="join-btn" class="btn-small">Unirse</button>
      </div>
    </div>

    <div class="panel">
      <h2>Mis chats</h2>
      <ul id="chat-list" class="chat-list"></ul>
      <p id="empty-msg" class="empty" style="display:none;">No tienes chats aun. Crea uno o unete con un codigo.</p>
    </div>

    <div class="panel panel-danger">
      <h2>Zona de peligro</h2>
      <p class="danger-text">Eliminar tu cuenta borrara todos tus datos, chats creados y mensajes de forma permanente.</p>
      <button id="delete-account-btn" class="btn-small btn-danger">Eliminar mi cuenta</button>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
